services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: m365_toolbox
      POSTGRES_USER: m365
      POSTGRES_PASSWORD: m365password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m365 -d m365_toolbox"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3001
      OUTPUT_DIR: /app/output
      TOOLBOX_SCRIPT_MOUNT_ROOT: /toolbox-scripts
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL:-postgresql://m365:m365password@postgres:5432/m365_toolbox}
      ARTIFACT_TOKEN_SECRET: ${ARTIFACT_TOKEN_SECRET:?Set ARTIFACT_TOKEN_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    volumes:
      - toolbox_output:/app/output
      - ./scripts:/toolbox-scripts:ro
    expose:
      - "3001"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: ["npm", "run", "start:worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      OUTPUT_DIR: /app/output
      TOOLBOX_SCRIPT_MOUNT_ROOT: /toolbox-scripts
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL:-postgresql://m365:m365password@postgres:5432/m365_toolbox}
      ARTIFACT_TOKEN_SECRET: ${ARTIFACT_TOKEN_SECRET:?Set ARTIFACT_TOKEN_SECRET}
    volumes:
      - toolbox_output:/app/output
      - ./scripts:/toolbox-scripts:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  toolbox_output:
  postgres_data:

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: m365-toolbox-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      OUTPUT_DIR: /app/output
      TOOLBOX_SCRIPT_MOUNT_ROOT: /toolbox-scripts
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
    volumes:
      - ./output:/app/output
      - ./scripts:/toolbox-scripts:ro
    ports:
      - "${BACKEND_PORT:-3001}:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: m365-toolbox-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

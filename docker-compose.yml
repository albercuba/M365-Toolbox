services:
  postgres:
    image: postgres:16-alpine
    container_name: m365-toolbox-postgres
    environment:
      POSTGRES_DB: m365_toolbox
      POSTGRES_USER: m365
      POSTGRES_PASSWORD: m365password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U m365 -d m365_toolbox"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: m365-toolbox-redis

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: m365-toolbox-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3001
      OUTPUT_DIR: /app/output
      TOOLBOX_SCRIPT_MOUNT_ROOT: /toolbox-scripts
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://m365:m365password@postgres:5432/m365_toolbox
      ARTIFACT_TOKEN_SECRET: dev-artifact-token-secret
      FRONTEND_ORIGIN: http://localhost:5173
    volumes:
      - ./output:/app/output
      - ./scripts:/toolbox-scripts:ro
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: m365-toolbox-worker
    command: ["npm", "run", "start:worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      OUTPUT_DIR: /app/output
      TOOLBOX_SCRIPT_MOUNT_ROOT: /toolbox-scripts
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://m365:m365password@postgres:5432/m365_toolbox
      ARTIFACT_TOKEN_SECRET: dev-artifact-token-secret
    volumes:
      - ./output:/app/output
      - ./scripts:/toolbox-scripts:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: m365-toolbox-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  postgres_data:

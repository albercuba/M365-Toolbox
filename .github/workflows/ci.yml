name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  node-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run test -w backend
      - run: npm run build -w frontend
      - run: npm audit --omit=dev -w backend
      - run: npm audit --omit=dev -w frontend

  powershell-analyzer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
      - name: Analyze PowerShell scripts
        shell: pwsh
        run: |
          $results = @(Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Severity Warning,Error)
          $warnings = @($results | Where-Object { $_.Severity -eq "Warning" })
          $errors = @($results | Where-Object { $_.Severity -eq "Error" })

          if ($warnings.Count -gt 0) {
            Write-Host "PSScriptAnalyzer warnings:"
            $warnings | Format-Table RuleName, Severity, ScriptName -AutoSize
          }

          if ($errors.Count -gt 0) {
            Write-Host "PSScriptAnalyzer errors:"
            $errors | Format-Table RuleName, Severity, ScriptName -AutoSize
            throw "PSScriptAnalyzer found error-severity issues."
          }

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build compose services
        env:
          ARTIFACT_TOKEN_SECRET: ci-artifact-token-secret
        run: docker compose -f docker-compose.prod.yml build backend worker frontend

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
